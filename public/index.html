<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Buddy Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a25;
      --bg-input: #0f0f16;
      --border: #2a2a3a;
      --border-highlight: #3a3a5a;
      --text-primary: #f0f0f8;
      --text-secondary: #a0a0b8;
      --text-muted: #606080;
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.3);
      --accent-secondary: #06b6d4;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --shiny: #ffd700;
      --rarity-common: #94a3b8;
      --rarity-uncommon: #22c55e;
      --rarity-rare: #3b82f6;
      --rarity-epic: #a855f7;
      --rarity-legendary: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    .font-mono { font-family: 'JetBrains Mono', monospace; }

    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(6, 182, 212, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    /* Language Switcher */
    .lang-switcher {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 8px;
      z-index: 100;
    }

    .lang-btn {
      padding: 8px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-btn:hover {
      border-color: var(--border-highlight);
      color: var(--text-primary);
    }

    .lang-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    header h1 {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 30px;
    }

    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(10px);
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }

    .panel-header h2 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }

    .panel-header .icon {
      font-size: 1.2rem;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 0.95rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .checkbox-wrapper:hover {
      border-color: var(--border-highlight);
    }

    .checkbox-wrapper input {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .checkbox-wrapper span {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    button {
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, var(--accent) 0%, #7c3aed 100%);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px var(--accent-glow);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      background: var(--bg-card);
      border: 1px solid var(--border);
    }

    button.secondary:hover {
      background: var(--bg-input);
      border-color: var(--border-highlight);
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    button.primary {
      margin-top: 10px;
    }

    .preview-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .preview-card.shiny {
      border-color: var(--shiny);
      box-shadow: 0 0 60px rgba(255, 215, 0, 0.15);
    }

    .preview-card.shiny::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0%, 100% { transform: translate(-30%, -30%) rotate(0deg); }
      50% { transform: translate(30%, 30%) rotate(10deg); }
    }

    .sprite-container {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .sprite-container.shiny pre {
      color: var(--shiny);
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }

    .sprite-container:not(.shiny) pre {
      color: var(--success);
    }

    .sprite-container pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.5;
      display: inline-block;
      text-align: left;
      white-space: pre;
    }

    .buddy-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .info-pill {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      text-align: center;
    }

    .info-pill .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .info-pill .value {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
      text-transform: capitalize;
    }

    .rarity-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .rarity-common { background: rgba(148, 163, 180, 0.2); color: var(--rarity-common); }
    .rarity-uncommon { background: rgba(34, 197, 94, 0.2); color: var(--rarity-uncommon); }
    .rarity-rare { background: rgba(59, 130, 246, 0.2); color: var(--rarity-rare); }
    .rarity-epic { background: rgba(168, 85, 247, 0.2); color: var(--rarity-epic); }
    .rarity-legendary { background: rgba(245, 158, 11, 0.2); color: var(--rarity-legendary); }

    .stats-container {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .stat-row:last-child {
      margin-bottom: 0;
    }

    .stat-name {
      width: 90px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-bar-container {
      flex: 1;
      height: 8px;
      background: var(--bg-secondary);
      border-radius: 4px;
      overflow: hidden;
    }

    .stat-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .stat-value {
      width: 35px;
      text-align: right;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .result-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      transition: all 0.2s;
    }

    .result-card:hover {
      border-color: var(--border-highlight);
      transform: translateY(-2px);
    }

    .result-card .sprite {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      line-height: 1.3;
      color: var(--success);
      margin-bottom: 12px;
      white-space: pre-wrap;
      overflow-x: auto;
    }

    .result-card.shiny .sprite {
      color: var(--shiny);
    }

    .result-card .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .result-card .name {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-primary);
    }

    .result-card .salt {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      word-break: break-all;
      margin-bottom: 10px;
    }

    .result-card .details {
      display: flex;
      gap: 12px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .result-card button {
      margin-top: 12px;
      padding: 8px 12px;
      font-size: 0.8rem;
    }

    .status {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 15px;
    }

    .status.loading {
      background: rgba(6, 182, 212, 0.1);
      color: var(--accent-secondary);
      border: 1px solid rgba(6, 182, 212, 0.3);
    }

    .status.success {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .status.error {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .section-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab {
      padding: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab:hover {
      border-color: var(--border-highlight);
      color: var(--text-primary);
    }

    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(139, 92, 246, 0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .face-display {
      text-align: center;
      padding: 16px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      color: var(--accent-secondary);
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>

  <div class="container">
    <!-- Language Switcher -->
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="zh">中文</button>
    </div>

    <header>
      <h1>🧪 Claude Buddy Lab</h1>
      <p data-i18n="header.subtitle">Discover your perfect Claude Code companion</p>
    </header>

    <div class="layout">
      <!-- Left Panel: Controls -->
      <div class="panel">
        <div class="panel-header">
          <span class="icon">🔬</span>
          <h2 data-i18n="panel.config">Configuration</h2>
        </div>

        <div class="form-group">
          <label for="userId" data-i18n="label.userId">User ID</label>
          <input type="text" id="userId" data-i18n-placeholder="placeholder.autoDetect">
        </div>

        <div class="form-group">
          <label for="salt">Salt</label>
          <input type="text" id="salt" value="friend-2026-401" data-i18n-placeholder="placeholder.enterSalt">
        </div>

        <button id="previewBtn" class="primary">
          <span>✨</span> <span data-i18n="btn.preview">Preview Buddy</span>
        </button>

        <div class="divider"></div>

        <div class="section-tabs">
          <div class="tab active" data-section="search" data-i18n="tab.search">Search</div>
          <div class="tab" data-section="filters" data-i18n="tab.filters">Filters</div>
        </div>

        <!-- Search Section -->
        <div id="searchSection">
          <div class="form-group">
            <label for="species" data-i18n="label.species">Species</label>
            <select id="species">
              <option value="" data-i18n="option.anySpecies">Any Species</option>
            </select>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="rarity" data-i18n="label.rarity">Rarity</label>
              <select id="rarity">
                <option value="" data-i18n="option.any">Any</option>
              </select>
            </div>
            <div class="form-group">
              <label for="eye" data-i18n="label.eye">Eye Type</label>
              <select id="eye">
                <option value="" data-i18n="option.any">Any</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="hat" data-i18n="label.hat">Hat</label>
              <select id="hat">
                <option value="" data-i18n="option.noneOnly">None Only</option>
              </select>
            </div>
            <div class="form-group">
              <label for="total" data-i18n="label.attempts">Attempts</label>
              <input type="number" id="total" value="500000" min="1000" max="10000000">
            </div>
          </div>
        </div>

        <!-- Filters Section -->
        <div id="filtersSection" style="display: none;">
          <div class="form-row">
            <div class="form-group">
              <label for="minStat" data-i18n="label.minStat">Min Stat</label>
              <input type="text" id="minStat" data-i18n-placeholder="placeholder.chaos80">
            </div>
            <div class="form-group">
              <label for="prefix" data-i18n="label.prefix">Prefix</label>
              <input type="text" id="prefix" value="lab-">
            </div>
          </div>

          <label class="checkbox-wrapper" for="shiny">
            <input type="checkbox" id="shiny">
            <span data-i18n="label.shinyOnly">✨ Shiny Only (1% chance)</span>
          </label>
        </div>

        <button id="searchBtn" class="secondary" style="margin-top: 15px;">
          <span>🔍</span> <span data-i18n="btn.search">Search</span>
        </button>
      </div>

      <!-- Right Panel: Preview & Results -->
      <div>
        <!-- Preview Panel -->
        <div class="panel" style="margin-bottom: 20px;">
          <div class="panel-header">
            <span class="icon">👁️</span>
            <h2 data-i18n="panel.preview">Preview</h2>
          </div>

          <div id="status" class="status loading">
            <span class="spinner"></span> <span data-i18n="status.initializing">Initializing...</span>
          </div>

          <div id="previewContainer"></div>
        </div>

        <!-- Results Panel -->
        <div class="panel">
          <div class="panel-header">
            <span class="icon">📋</span>
            <h2 data-i18n="panel.results">Search Results</h2>
          </div>

          <div id="searchStatus" class="status" style="background: var(--bg-input);" data-i18n="status.noSearch">
            No search performed yet
          </div>

          <div class="results-grid" id="results"></div>
        </div>
      </div>
    </div>
  </div>

        'info.shiny': '闪光',
        'info.yes': '是',
        'info.eye_label': '眼睛',
        'info.hat_label': '帽子',
        'stat.DEBUGGING': '调试',
        'stat.PATIENCE': '耐心',
        'stat.CHAOS': '混乱',
        'stat.WISDOM': '智慧',
        'stat.SNARK': '讽刺'
      }
    };

    let currentLang = 'en';

    function setLanguage(lang) {
      currentLang = lang;

      // Update buttons
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });

      // Update all elements with data-i18n
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (translations[lang][key]) {
          el.textContent = translations[lang][key];
        }
      });

      // Update placeholders
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.dataset.i18nPlaceholder;
        if (translations[lang][key]) {
          el.placeholder = translations[lang][key];
        }
      });

      // Re-render if there's a preview
      if ($('previewContainer').innerHTML) {
        const lastData = window.lastPreviewData;
        if (lastData) {
          renderPreview(lastData);
        }
      }

      // Update search status
      const searchStatus = $('searchStatus');
      if (searchStatus.textContent.includes('✓ Found') || searchStatus.textContent.includes('找到')) {
        const count = searchStatus.getAttribute('data-count');
        if (count) {
          updateSearchStatus(count);
        }
      }
    }

    // Language switcher event listeners
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        setLanguage(btn.dataset.lang);
      });
    });

    const $ = id => document.getElementById(id);

    function updateSearchStatus(count) {
      const text = count === 1
        ? `${translations[currentLang]['status.found']} ${count} ${translations[currentLang]['status.matches']}`
        : `${translations[currentLang]['status.found']} ${count} ${translations[currentLang]['status.matches']}`;
      $('searchStatus').textContent = text;
      $('searchStatus').setAttribute('data-count', count);
    }

    async function loadMeta() {
      try {
        const res = await fetch('/api/meta');
        const meta = await res.json();

        fillSelect($('species'), meta.species, 'option.anySpecies');
        fillSelect($('rarity'), meta.rarities, 'option.any', true);
        fillSelect($('eye'), meta.eyes, 'option.any');
        fillSelect($('hat'), meta.hats, 'option.noneOnly', true);

        if (meta.detectedUserId) {
          $('userId').value = meta.detectedUserId;
          $('status').className = 'status success';
          $('status').textContent = '✓ User ID detected';
        } else {
          $('userId').value = 'anon';
          $('status').className = 'status';
          $('status').textContent = 'Using anonymous mode';
        }
        $('salt').value = meta.defaultSalt;

      } catch (e) {
        $('status').className = 'status error';
        $('status').textContent = 'Error: ' + e.message;
      }
    }

    function fillSelect(select, values, defaultKey, useRarity = false) {
      const defaultOpt = document.createElement('option');
      defaultOpt.value = '';
      defaultOpt.textContent = translations[currentLang][defaultKey] || defaultKey;
      select.appendChild(defaultOpt);

      for (const v of values) {
        const opt = document.createElement('option');
        opt.value = v;
        if (useRarity) {
          const rarityKey = `rarity.${v}`;
          opt.textContent = translations[currentLang][rarityKey] || v;
        } else if (v === 'none') {
          opt.textContent = translations[currentLang]['option.noneOnly'] || 'None';
        } else {
          opt.textContent = v.charAt(0).toUpperCase() + v.slice(1);
        }
        select.appendChild(opt);
      }
    }

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        const section = tab.dataset.section;
        if (section === 'search') {
          $('searchSection').style.display = 'block';
          $('filtersSection').style.display = 'none';
        } else {
          $('searchSection').style.display = 'none';
          $('filtersSection').style.display = 'block';
        }
      });
    });

    async function preview() {
      const userId = $('userId').value || 'anon';
      const salt = $('salt').value;

      $('status').className = 'status loading';
      $('status').innerHTML = '<span class="spinner"></span> ' + translations[currentLang]['status.generatingPreview'];

      try {
        const res = await fetch('/api/preview', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, salt })
        });
        const data = await res.json();
        renderPreview(data);
        window.lastPreviewData = data;
        $('status').className = 'status success';
        $('status').textContent = translations[currentLang]['status.previewGenerated'];
      } catch (e) {
        $('status').className = 'status error';
        $('status').textContent = 'Error: ' + e.message;
      }
    }

    function renderPreview(data) {
      const { buddy, sprite, salt, userId, face } = data;
      const spriteText = sprite.join('\n');
      const t = translations[currentLang];

      const rarityClass = `rarity-${buddy.rarity}`;
      const rarityDisplay = t[`rarity.${buddy.rarity}`] || buddy.rarity;

      let html = `
        <div class="preview-card ${buddy.shiny ? 'shiny' : ''}">
          <div class="sprite-container ${buddy.shiny ? 'shiny' : ''}">
            <pre>${escapeHtml(spriteText)}</pre>
          </div>

          ${buddy.shiny ? `<div class="face-display">✨ ${escapeHtml(face)} ✨</div>` : ''}

          <div class="buddy-info">
            <div class="info-pill">
              <div class="label">${t['info.species']}</div>
              <div class="value">${buddy.species}</div>
            </div>
            <div class="info-pill">
              <div class="label">${t['info.rarity']}</div>
              <div class="value"><span class="rarity-badge ${rarityClass}">${rarityDisplay}</span></div>
            </div>
            <div class="info-pill">
              <div class="label">${t['info.eye']}</div>
              <div class="value">${escapeHtml(buddy.eye)}</div>
            </div>
            <div class="info-pill">
              <div class="label">${t['info.hat']}</div>
              <div class="value">${buddy.hat || '-'}</div>
            </div>
            ${buddy.shiny ? `
            <div class="info-pill" style="border-color: var(--shiny);">
              <div class="label">${t['info.shiny']}</div>
              <div class="value" style="color: var(--shiny);">✦ ${t['info.yes']}</div>
            </div>
            ` : ''}
          </div>

          <div class="stats-container">
      `;

      const statColors = {
        DEBUGGING: '#3b82f6',
        PATIENCE: '#22c55e',
        CHAOS: '#ef4444',
        WISDOM: '#a855f7',
        SNARK: '#f59e0b'
      };

      for (const [name, value] of Object.entries(buddy.stats)) {
        const statName = t[`stat.${name}`] || name;
        html += `
          <div class="stat-row">
            <span class="stat-name">${statName}</span>
            <div class="stat-bar-container">
              <div class="stat-bar-fill" style="width: ${value}%; background: ${statColors[name]}"></div>
            </div>
            <span class="stat-value">${value}</span>
          </div>
        `;
      }

      html += '</div></div>';
      $('previewContainer').innerHTML = html;
    }

    async function search() {
      const userId = $('userId').value || 'anon';
      const filters = {
        species: $('species').value,
        rarity: $('rarity').value,
        eye: $('eye').value,
        hat: $('hat').value,
        shiny: $('shiny').checked,
        minStat: $('minStat').value,
        total: parseInt($('total').value) || 500000,
        prefix: $('prefix').value || 'lab-',
      };

      $('searchStatus').className = 'status loading';
      $('searchStatus').innerHTML = '<span class="spinner"></span> ' + translations[currentLang]['status.searching'];
      $('results').innerHTML = '';

      try {
        const res = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, ...filters })
        });
        const data = await res.json();

        if (data.matches.length === 0) {
          $('searchStatus').className = 'status';
          $('searchStatus').textContent = translations[currentLang]['status.noMatches'];
          return;
        }

        $('searchStatus').className = 'status success';
        updateSearchStatus(data.matches.length);

        for (const m of data.matches) {
          const card = document.createElement('div');
          card.className = 'result-card' + (m.buddy.shiny ? ' shiny' : '');
          card.innerHTML = `
            <div class="sprite">${escapeHtml(m.sprite.join('\n'))}</div>
            <div class="header">
              <span class="rarity-badge rarity-${m.buddy.rarity}">${m.buddy.rarity}</span>
              <span class="name">${m.buddy.species}</span>
              ${m.buddy.shiny ? '<span style="color: var(--shiny);">✨</span>' : ''}
            </div>
            <div class="salt">${escapeHtml(m.salt)}</div>
            <div class="details">
              <span>${translations[currentLang]['info.eye']}: ${escapeHtml(m.buddy.eye)}</span>
              <span>${translations[currentLang]['info.hat']}: ${m.buddy.hat || '-'}</span>
            </div>
            <button class="secondary">${translations[currentLang]['btn.previewThis']}</button>
          `;

          card.querySelector('button').onclick = (e) => {
            e.stopPropagation();
            $('salt').value = m.salt;
            renderPreview({ ...m, userId });
            window.lastPreviewData = { ...m, userId };
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          $('results').appendChild(card);
        }
      } catch (e) {
        $('searchStatus').className = 'status error';
        $('searchStatus').textContent = 'Error: ' + e.message;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Event listeners
    $('previewBtn').onclick = preview;
    $('searchBtn').onclick = search;

    $('filtersSection').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') search();
    });

    // Initialize
    loadMeta();
  </script>
</body>
</html>
